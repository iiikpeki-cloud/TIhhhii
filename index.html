<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тихий | Боты</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            margin: 0;
            padding: 20px;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 { 
            text-align: center; 
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.2em;
        }
        .sub { text-align: center; color: #888; margin-top: -10px; margin-bottom: 30px; }
        
        /* вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            background: #1e1e2a;
            border: 1px solid #2a2a3a;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #aaa;
        }
        .tab-btn.active {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }
        .tab-btn:hover {
            transform: translateY(-2px);
            background: #2a2a3a;
        }
        
        /* контент вкладок */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* карточки ботов */
        .bot-card {
            background: #1e1e2a;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #2a2a3a;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .bot-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.2);
            border-color: #7c3aed;
        }
        .bot-card:active {
            transform: translateY(0px);
        }
        .bot-card h3 { margin: 0 0 8px 0; color: #a78bfa; }
        .bot-card p { margin: 5px 0; color: #aaa; font-size: 14px; }
        .bot-link {
            display: inline-block;
            margin-top: 10px;
            background: #7c3aed;
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            transition: 0.2s;
        }
        .bot-link:hover {
            background: #6d28d9;
            transform: translateY(-2px);
        }
        
        /* поддержка */
        .support-card {
            background: #1e1e2a;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #2a2a3a;
        }
        .donate-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .donate-btn {
            background: #2a2a3a;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .donate-btn:hover {
            transform: translateY(-3px);
            background: #7c3aed;
        }
        
        /* админка */
        .admin-panel {
            background: #1a1a2a;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #7c3aed;
        }
        .hidden { display: none; }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #3a3a4a;
            background: #0f0f1a;
            color: #e0e0e0;
        }
        button {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            margin: 5px 5px 0 0;
            transition: 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            background: #6d28d9;
        }
        button.danger { background: #dc2626; }
        button.danger:hover { background: #b91c1c; }
        .bot-item {
            background: #0f0f1a;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* футер */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #2a2a3a;
            color: #666;
            font-size: 14px;
        }
        .footer a {
            color: #a78bfa;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        
        hr { border-color: #2a2a3a; }
    </style>
</head>
<body>
<div class="container">
    <h1>Тихий</h1>
    <div class="sub">Тг боты</div>
    
    <!-- вкладки -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="bots">Боты</button>
        <button class="tab-btn" data-tab="support">Поддержать нас</button>
    </div>
    
    <!-- вкладка Боты -->
    <div id="tab-bots" class="tab-content active">
        <div id="botsList"></div>
    </div>
    
    <!-- вкладка Поддержать авторов -->
    <div id="tab-support" class="tab-content">
        <div class="support-card">
            <h3>Поддержать нас</h3>
            <p>Если вам нравятся наши боты, вы можете поддержать нас</p>
            <div class="donate-buttons">
                <a href="https://www.donationalerts.com/r/tiihhii" target="_blank" class="donate-btn"> DonationAlerts</a>
                <a href="https://boosty.to/tiihhii" target="_blank" class="donate-btn"> Boosty</a>
                <a href="https://www.tinkoff.ru/rm/tihii.tihii1/4Hc0B12345" target="_blank" class="donate-btn"> Тинькофф</a>
                <a href="https://yoomoney.ru/to/410011123456789" target="_blank" class="donate-btn"> ЮMoney</a>
            </div>
            <p style="margin-top: 20px; font-size: 14px; color: #888">Спасибо за поддержку!</p>
        </div>
    </div>
    
    <!-- админка -->
    <div id="adminPanel" class="admin-panel hidden">
        <h2>Админка</h2>
        <div id="authSection">
            <input type="password" id="adminPassword" placeholder="Введите пароль">
            <button onclick="checkPassword()">Войти</button>
        </div>
        <div id="adminControls" class="hidden">
            <h3>Добавить бота</h3>
            <input type="text" id="botName" placeholder="Название бота">
            <input type="text" id="botUsername" placeholder="Username (без @)">
            <textarea id="botDesc" placeholder="Описание"></textarea>
            <button onclick="addBot()">Добавить</button>
            
            <h3>Список ботов</h3>
            <div id="botsAdminList"></div>
        </div>
    </div>
    
    <!-- футер с нашим тг -->
    <div class="footer">
        <p>Наш Telegram: <a href="https://t.me/TIhhhii_gift" target="_blank">@TIhhhii_gift</a></p>
        <button onclick="toggleAdmin()" style="background: none; border: 1px solid #7c3aed; margin-top: 10px;">Админка</button>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "TIhhhiiserverbot121";
    
    let bots = [];
    
    // вкладки
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        });
    });
    
    function loadBots() {
        const saved = localStorage.getItem("tihiy_bots");
        if (saved) {
            bots = JSON.parse(saved);
        } else {
            bots = [];
            saveBots();
        }
        renderBots();
    }
    
    function saveBots() {
        localStorage.setItem("tihiy_bots", JSON.stringify(bots));
        renderBots();
        const adminControls = document.getElementById("adminControls");
        if (adminControls && !adminControls.classList.contains("hidden")) {
            renderAdminList();
        }
    }
    
    function renderBots() {
        const container = document.getElementById("botsList");
        if (bots.length === 0) {
            container.innerHTML = "<p style='text-align:center'>Пока нет ботов...</p>";
            return;
        }
        container.innerHTML = bots.map(bot => `
            <div class="bot-card">
                <h3>${escapeHtml(bot.name)}</h3>
                <p>${escapeHtml(bot.desc)}</p>
                <a href="https://t.me/${escapeHtml(bot.username)}" target="_blank" class="bot-link">@${escapeHtml(bot.username)}</a>
            </div>
        `).join("");
    }
    
    function renderAdminList() {
        const container = document.getElementById("botsAdminList");
        if (bots.length === 0) {
            container.innerHTML = "<p>Нет ботов</p>";
            return;
        }
        container.innerHTML = bots.map((bot, index) => `
            <div class="bot-item">
                <div>
                    <strong>${escapeHtml(bot.name)}</strong><br>
                    @${escapeHtml(bot.username)}
                </div>
                <div>
                    <button onclick="editBot(${index})" style="background:#f59e0b">Редактировать</button>
                    <button onclick="deleteBot(${index})" class="danger">Удалить</button>
                </div>
            </div>
        `).join("");
    }
    
    function addBot() {
        const name = document.getElementById("botName").value.trim();
        const username = document.getElementById("botUsername").value.trim();
        const desc = document.getElementById("botDesc").value.trim();
        
        if (!name || !username) {
            alert("Заполните название и username!");
            return;
        }
        
        bots.push({ name, username, desc });
        saveBots();
        
        document.getElementById("botName").value = "";
        document.getElementById("botUsername").value = "";
        document.getElementById("botDesc").value = "";
    }
    
    function deleteBot(index) {
        if (confirm("Удалить бота?")) {
            bots.splice(index, 1);
            saveBots();
        }
    }
    
    function editBot(index) {
        const bot = bots[index];
        const newName = prompt("Новое название:", bot.name);
        if (newName !== null) bot.name = newName;
        const newUsername = prompt("Новый username (без @):", bot.username);
        if (newUsername !== null) bot.username = newUsername;
        const newDesc = prompt("Новое описание:", bot.desc);
        if (newDesc !== null) bot.desc = newDesc;
        saveBots();
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }
    
    function checkPassword() {
        const pwd = document.getElementById("adminPassword").value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById("authSection").classList.add("hidden");
            document.getElementById("adminControls").classList.remove("hidden");
            renderAdminList();
        } else {
            alert("Неверный пароль!");
        }
    }
    
    function toggleAdmin() {
        const panel = document.getElementById("adminPanel");
        if (panel.classList.contains("hidden")) {
            panel.classList.remove("hidden");
            document.getElementById("authSection").classList.remove("hidden");
            document.getElementById("adminControls").classList.add("hidden");
            document.getElementById("adminPassword").value = "";
        } else {
            panel.classList.add("hidden");
        }
    }
    
    loadBots();
</script>
</body>
</html>
